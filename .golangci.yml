version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - bodyclose
    - cyclop
    - dupl
    - gocritic
    - gofmt
    - goimports
    - misspell
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - whitespace

  settings:
    cyclop:
      max-complexity: 15

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

    gosec:
      excludes:
        - G115

    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - disableStutteringCheck

    misspell:
      locale: US

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
